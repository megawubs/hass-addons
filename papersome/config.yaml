name: "Papersome"
version: "main"
slug: papersome
description: "Transform RSS/Atom feeds into ePub newspapers and magazines"
url: "https://github.com/thijskuilman/papersome"
arch:
  - aarch64
  - amd64
image: "ghcr.io/megawubs/hass-addons/papersome-{arch}"
init: false
privileged:
  - SYS_ADMIN
ports:
  8080/tcp: 8088
ports_description:
  8080/tcp: "Papersome web interface"
webui: "http://[HOST]:[PORT:8088]"
panel_icon: mdi:newspaper
map:
  - media:rw
  - share:rw
  - addon_config:rw
options:
  app_url: ""
  db_password: "papersome"
  app_debug: false
schema:
  app_url: str?
  db_password: password
  app_debug: bool

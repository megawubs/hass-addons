name: "Audiobookshelf KOReader Sync Bridge"
version: "1.0"
slug: abs-kosync-bridge
description: "Sync reading progress between AudiobookShelf, KOReader, Storyteller and Booklore"
url: "https://github.com/cporcellijr/abs-kosync-bridge"
arch:
  - aarch64
  - amd64
panel_icon: mdi:sync
init: false
ports:
  5757/tcp: 5757
ports_description:
  5757/tcp: Web UI dashboard
webui: http://[HOST]:[PORT:5757]
map:
  - share:rw
  - addon_config:rw
  - media:rw
options:
  books_path: "/media/books"
  log_level: "INFO"
  tz: "UTC"
schema:
  books_path: str
  log_level: list(DEBUG|INFO|WARNING|ERROR)
  tz: str
